<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEXO Snake - O'yin Rejimlari</title>
    <link rel="stylesheet" href="game.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <a href="home.html" class="back-btn">
                <span class="back-icon">←</span>
            </a>
            <div class="page-title">O'yin Rejimlari</div>
            <div class="header-spacer"></div> </header>

        <main class="main-content">
            <div class="section-intro">
                <div class="glow-effect"></div>
                <p class="subtitle">O'zingizga mos multiplayer rejimini tanlang va TON yutib oling!</p>
            </div>

            <div class="menu-buttons">
                <a href="random_game.html" class="menu-link">
                    <button class="menu-btn mode-random">
                        <div class="btn-content">
                            <span class="btn-icon">🎮</span>
                            <div class="btn-text">
                                <span class="btn-title">RANDOM GAME</span>
                                <span class="btn-desc">Tasodifiy raqib bilan tezkor o'yin</span>
                            </div>
                        </div>
                        <div class="btn-glow"></div>

                </a>

                <a href="create_game.html" class="menu-link">
                    <button class="menu-btn mode-create">
                        <div class="btn-content">
                            <span class="btn-icon">🛠️</span>

                                <span class="btn-title">CREATE GAME</span>
                                <span class="btn-desc">Xona oching va do'stlaringizni taklif qiling</span>
                            </div>
                        </div>
                        <div class="btn-glow"></div>
                    </button>
                </a>

                <a href="search_game.html" class="menu-link">
                    <button class="menu-btn mode-search">
                        <div class="btn-content">
                            <span class="btn-icon">🔍</span>
                            <div class="btn-text">
                                <span class="btn-title">GAME SEARCH</span>
                                <span class="btn-desc">ID orqali yaratilgan xonalarni qidirish</span>
                            </div>
                        </div>
                        <div class="btn-glow"></div>
                    </button>
                </a>
            </div>
        </main>

        <footer class="footer">
            <span class="brand-text">DEXO GAMES ECOSYSTEM</span>
        </footer>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
